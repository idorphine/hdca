apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapache-deployment
  labels:
    app: myapache
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapache
  template:
    metadata:
      labels:
        app: myapache
    spec:
      containers:
      - name: myapache-container
        image: localhost/myapache:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: myapache-service
spec:
  selector:
    app: myapache
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007